<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footer NIDOUM — Aliado arcompany</title>
  <!-- Fuentes NIDOUM -->
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@200;300;400;500;600&family=Roboto+Serif:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Eliminamos cualquier espacio muerto en el body */
    body {
      margin: 0;
      padding: 0;
      background-color: #514946; /* mismo fondo para continuidad visual */
    }

    /* FOOTER NIDOUM — FONDO OSCURO */
    .nidoum-footer {
      background-color: #514946;
      color: #e6d6c7;
      font-family: 'Albert Sans', sans-serif;
      padding: 3rem 2rem 1.8rem 2rem;
      border-top: 0.5px solid rgba(230, 214, 199, 0.15);
    }

    .footer-container {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1rem;
    }

    /* COLUMNA IZQUIERDA: logo + frase */
    .footer-brand {
      flex: 1 1 240px;
    }

    .footer-logo {
      width: 180px;
      height: auto;
      margin-bottom: 1rem;
      opacity: 0.92;
      transition: opacity 0.2s;
    }

    .footer-tagline {
      font-family: 'Roboto Serif', serif;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.03em;
      color: #d4c0ae;
      line-height: 1.5;
      max-width: 260px;
      margin-top: 0.5rem;
    }

    /* COLUMNA DE CONTACTO — PEGADA A LA DERECHA + CENTRADA */
    .footer-contact {
      flex: 0 0 auto;
      margin-left: auto;
      text-align: left;
    }

    .contact-title {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #b8a898;
      margin-bottom: 1rem;
      font-weight: 400;
    }

    .contact-icons {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Albert Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 300;
      color: #e0cfbf;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item:hover {
      color: #ffffff;
    }

    .contact-item svg {
      width: 18px;
      height: 18px;
      stroke: #d4c0ae;
      stroke-width: 1.2;
      fill: none;
      flex-shrink: 0;
    }

    /* AVISO DE PRIVACIDAD: justo debajo del contacto, arriba de powered by */
    .privacy-row {
      max-width: 1280px;
      margin: 0.5rem auto 1.2rem auto;
      text-align: right;
    }

    .privacy-link-footer {
      color: #c8b8a8;
      text-decoration: none;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 0.5px solid rgba(230, 214, 199, 0.3);
      padding-bottom: 3px;
      transition: color 0.2s, border-color 0.2s;
      display: inline-block;
    }

    .privacy-link-footer:hover {
      color: #e6d6c7;
      border-bottom-color: #e6d6c7;
    }

    /* FRANJA INFERIOR (copyright + powered by + logo aliado) */
    .footer-bottom {
      max-width: 1280px;
      margin: 1.5rem auto 0 auto;
      padding-top: 1.5rem;
      border-top: 0.5px solid rgba(230, 214, 199, 0.18);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #b0a094;
    }

    .copyright {
      font-family: 'Albert Sans', sans-serif;
      font-weight: 300;
    }

    .bottom-right {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .powered-link {
      color: #c8b8a8;
      text-decoration: none;
      transition: color 0.2s;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 0.5px solid rgba(230, 214, 199, 0.3);
      padding-bottom: 2px;
    }

    .powered-link:hover {
      color: #e6d6c7;
    }

    /* Logo aliado arcompany */
    .partner-logo {
      height: 45px;
      width: auto;
      max-height: 45px;
      opacity: 0.9;
      transition: opacity 0.2s, transform 0.2s;
      vertical-align: middle;
      margin-left: 4px;
      display: inline-block;
    }

    .partner-logo:hover {
      opacity: 1;
      transform: scale(1.02);
    }

    /* RESPONSIVE: ajustes para móviles */
    @media (max-width: 780px) {
      .footer-container {
        flex-direction: column;
        align-items: stretch;
        gap: 2rem;
      }
      
      .footer-contact {
        margin-left: 0;
        width: 100%;
      }
      
      .privacy-row {
        text-align: left;
        margin-top: 0.75rem;
        margin-bottom: 1.2rem;
      }
      
      .footer-bottom {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .bottom-right {
        margin-top: 0.5rem;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <!-- FOOTER SIN ESPACIOS MUERTOS EXTERIORES -->
  <footer class="nidoum-footer">
    <div class="footer-container">
      <div class="footer-brand">
        <img class="footer-logo" src="https://nidoum.com/wp-content/uploads/2026/03/03.1B_8-Logo-Alt_Inv-Core@2x-1.png" alt="NIDOUM">
        <div class="footer-tagline">Hábitat consciente · desarrollo con propósito</div>
      </div>

      <div class="footer-contact">
        <div class="contact-title">Contáctanos</div>
        <div class="contact-icons">
          <a href="mailto:pablo@nidoum.com" class="contact-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="M22 7l-10 7L2 7" />
            </svg>
            <span>pablo@nidoum.com</span>
          </a>
          <a href="tel:+524771918521" class="contact-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
            </svg>
            <span>477 191 8521</span>
          </a>
        </div>
      </div>
    </div>

    <div class="privacy-row">
      <a href="#" id="privacyLinkFooter" class="privacy-link-footer">Aviso de privacidad</a>
    </div>

    <div class="footer-bottom">
      <div class="copyright">
        © <span id="currentYear"></span> NIDOUM — Conscious Habitat
      </div>
      <div class="bottom-right">
        <a href="https://www.huntersolutions.com.mx/" target="_blank" rel="noopener noreferrer" class="powered-link">designed by Hunter Solutions</a>
        <img class="partner-logo" 
             src="https://nidoum.com/wp-content/uploads/2026/03/03.1B_10-Arco-Icon_Inv-Core@2x-1.png" 
             alt="arcompany · aliados de NIDOUM"
             title="arcompany — aliados NIDOUM">
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('currentYear').innerText = new Date().getFullYear();
    const privacyBtn = document.getElementById('privacyLinkFooter');
    if (privacyBtn) {
      privacyBtn.addEventListener('click', (e) => {
        e.preventDefault();
        alert("Política de privacidad: enlace a la página oficial.\n(Reemplazar con la URL real del aviso de privacidad)");
      });
    }
  </script>
</body>
</html>
