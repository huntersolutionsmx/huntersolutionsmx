  <style>

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background:none;
      font-family: 'DM Mono', monospace;
    }

    .hs-card {
      background: #593622;
      border-radius: 18px;
      padding: 36px 30px 30px;
      width: 380px;
      position: relative;
      overflow: hidden;
    }

    .hs-inner {
      position: relative;
      z-index: 1;
    }

    .hs-eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .hs-eyebrow-text {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #bfa58e;
      opacity: 0.7;
    }

    .hs-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 300;
      color: #bfa58e;
      line-height: 1.05;
      letter-spacing: 0.01em;
      margin-bottom: 6px;
    }

    .hs-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: #bfa58e;
      opacity: 0.5;
      margin-bottom: 28px;
    }

    .hs-divider {
      width: 100%;
      height: 0.5px;
      background: rgba(191, 165, 142, 0.2);
      margin-bottom: 24px;
    }

    .hs-body {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.65;
      color: #bfa58e;
      opacity: 0.85;
      margin-bottom: 28px;
    }

    .hs-body strong {
      font-weight: 600;
      color: #f27244;
      opacity: 1;
    }

    .hs-discord-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .hs-discord-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: rgba(242, 114, 68, 0.12);
      border: 1px solid rgba(242, 114, 68, 0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .hs-discord-icon svg {
      width: 22px; height: 22px;
      fill: #f27244;
    }

    .hs-discord-info {
      flex: 1;
    }

    .hs-discord-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 600;
      color: #bfa58e;
      letter-spacing: 0.03em;
      margin-bottom: 2px;
    }

    .hs-discord-handle {
      font-size: 10px;
      color: #bfa58e;
      opacity: 0.4;
      letter-spacing: 0.06em;
    }

    .hs-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #f27244;
      color: #3a1e0e;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 10px 20px;
      border-radius: 24px;
      border: none;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .hs-btn:hover {
      background: #d9411e;
      color: #fff;
    }

    .hs-footer {
      margin-top: 24px;
      display: flex;
      align-items: center;
    }

    .hs-footer-tag {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      font-style: italic;
      letter-spacing: 0.1em;
      color: #bfa58e;
      opacity: 0.3;
      white-space: nowrap;
    }

    .hs-footer-line {
      height: 0.5px;
      flex: 1;
      background: rgba(191,165,142,0.15);
      margin: 0 12px;
    }
  </style>
</head>
