<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Etapas del Ecosistema · NIDOUM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@200;300;400;500&family=Roboto+Serif:ital,wght@0,200;0,300;1,200;1,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Palettes ── */
    :root {
      --bg:      #F2E6D6;
      --text:    #2E2018;
      --muted:   #7B5C3E;
      --accent:  #7B5C3E;
      --line:    rgba(46,32,24,0.15);
      --T: background 0.85s cubic-bezier(.4,0,.2,1),
           color      0.85s cubic-bezier(.4,0,.2,1),
           border-color 0.85s cubic-bezier(.4,0,.2,1),
           stroke     0.85s cubic-bezier(.4,0,.2,1);
    }

    .th-tierra {
      --bg:    #F0E4D6;
      --text:  #2A1508;
      --muted: #8A4428;
      --accent:#C07050;
      --line:  rgba(42,21,8,0.12);
    }
    .th-semilla {
      --bg:    #F5EDD0;
      --text:  #2A1E04;
      --muted: #7A5A10;
      --accent:#B8921A;
      --line:  rgba(42,30,4,0.12);
    }
    .th-nutrimiento {
      --bg:    #141A28;
      --text:  #D8E0F0;
      --muted: #7A8AAA;
      --accent:#8C9AB8;
      --line:  rgba(216,224,240,0.1);
    }
    .th-siembra {
      --bg:    #F0E2E6;
      --text:  #200810;
      --muted: #6A1828;
      --accent:#A03050;
      --line:  rgba(32,8,16,0.12);
    }
    .th-cosecha {
      --bg:    #E4EFE4;
      --text:  #0C200E;
      --muted: #3A6040;
      --accent:#4A7850;
      --line:  rgba(12,32,14,0.12);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Albert Sans', sans-serif;
      transition: var(--T);
    }

    /* ── Full page ── */
    .stage-page {
      min-height: 100vh;
      width: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr;
      background: var(--bg);
      transition: var(--T);
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 36px 64px 0;
    }

    .brand-mark {
      font-family: 'Albert Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.85s;
    }

    .stage-counter {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.25;
      transition: opacity 0.5s, transform 0.5s, background 0.85s;
      cursor: pointer;
      border: none;
      padding: 0;
    }
    .dot.active { opacity: 1; transform: scale(1.6); }

    /* ── Main content ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      padding: 0 64px;
      gap: 0;
      height: 100%;
    }

    /* Left: tag + title + body */
    .col-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 48px;
    }

    .stage-tag {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: color 0.85s;
    }

    .stage-tag::before {
      content: '';
      display: block;
      width: 28px;
      height: 0.5px;
      background: var(--accent);
      transition: background 0.85s;
    }

    .stage-title {
      font-family: 'Roboto Serif', serif;
      font-size: clamp(40px, 5.5vw, 80px);
      font-weight: 200;
      font-style: italic;
      color: var(--text);
      line-height: 1.05;
      margin-bottom: 32px;
      transition: color 0.85s;
    }

    .stage-divider {
      width: 36px;
      height: 0.5px;
      background: var(--accent);
      margin-bottom: 28px;
      transition: background 0.85s;
    }

    .stage-body {
      font-family: 'Albert Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.9;
      color: var(--muted);
      max-width: 380px;
      transition: color 0.85s;
    }

    /* Center: icon */
    .col-center {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
      position: relative;
    }

    /* Decorative ring behind icon */
    .icon-ring {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      border: 0.5px solid var(--line);
      transition: border-color 0.85s;
    }

    .icon-ring-outer {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      border: 0.5px dashed var(--line);
      transition: border-color 0.85s;
      animation: rotateRing 60s linear infinite;
    }

    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .stage-icon-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 200px;
      height: 200px;
    }

    .stage-icon-wrap svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Right: meta info */
    .col-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 48px;
      border-left: 0.5px solid var(--line);
      height: 60%;
      transition: border-color 0.85s;
    }

    .meta-title {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
      transition: color 0.85s;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 28px;
    }

    .meta-key {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.85s;
      opacity: 0.6;
    }

    .meta-val {
      font-family: 'Roboto Serif', serif;
      font-size: 15px;
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      transition: color 0.85s;
      line-height: 1.4;
    }

    /* ── Bottom nav ── */
    .bottombar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 64px 40px;
    }

    .stage-num-large {
      font-family: 'Roboto Serif', serif;
      font-size: 11px;
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.1em;
      transition: color 0.85s;
    }

    .nav-arrows {
      display: flex;
      gap: 10px;
    }

    .arrow-btn {
      width: 48px; height: 48px;
      border: 0.5px solid var(--accent);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: background 0.3s, color 0.3s, border-color 0.85s;
      border-radius: 0;
    }

    .arrow-btn:hover {
      background: var(--text);
      color: var(--bg);
    }

    .arrow-btn svg { width: 15px; height: 15px; }

    .stage-hint {
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.85s;
    }

    /* ── Fade animation ── */
    .content-fade {
      transition: opacity 0.3s ease, transform 0.35s ease;
    }

    .content-fade.out {
      opacity: 0;
      transform: translateY(10px);
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .topbar, .bottombar { padding: 28px 24px 0; }
      .bottombar { padding: 0 24px 32px; }

      .main {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        padding: 32px 24px;
        gap: 40px;
      }

      .col-left { padding-right: 0; }

      .col-center { order: -1; padding: 0; }
      .icon-ring { width: 200px; height: 200px; }
      .icon-ring-outer { width: 260px; height: 260px; }
      .stage-icon-wrap { width: 130px; height: 130px; }

      .col-right {
        padding-left: 0;
        border-left: none;
        border-top: 0.5px solid var(--line);
        padding-top: 32px;
        height: auto;
      }
    }
  </style>
</head>
<body>

<div class="stage-page th-tierra" id="stagePage">

  <!-- Top bar -->
  <div class="topbar">
    <span class="brand-mark">NIDOUM · Conscious Habitat</span>
    <div class="stage-counter" id="dots"></div>
  </div>

  <!-- Main 3-col grid -->
  <div class="main">

    <!-- Left -->
    <div class="col-left content-fade" id="colLeft">
      <span class="stage-tag" id="stageTag">Etapa 01</span>
      <h1 class="stage-title" id="stageTitle">Tierra</h1>
      <div class="stage-divider"></div>
      <p class="stage-body" id="stageBody"></p>
    </div>

    <!-- Center icon -->
    <div class="col-center">
      <div class="icon-ring"></div>
      <div class="icon-ring-outer"></div>
      <div class="stage-icon-wrap content-fade" id="iconWrap">
        <!-- SVG injected by JS -->
      </div>
    </div>

    <!-- Right meta -->
    <div class="col-right content-fade" id="colRight">
      <p class="meta-title">Detalles de la etapa</p>

      <div class="meta-item">
        <span class="meta-key">Dimensión</span>
        <span class="meta-val" id="metaDim">—</span>
      </div>
      <div class="meta-item">
        <span class="meta-key">Rol del participante</span>
        <span class="meta-val" id="metaRol">—</span>
      </div>
      <div class="meta-item">
        <span class="meta-key">Resultado clave</span>
        <span class="meta-val" id="metaRes">—</span>
      </div>
    </div>

  </div>

  <!-- Bottom bar -->
  <div class="bottombar">
    <span class="stage-num-large" id="stageNumLarge">01 · 05</span>
    <span class="stage-hint" id="stageHint">Explorar etapas</span>
    <div class="nav-arrows">
      <button class="arrow-btn" id="prevBtn" aria-label="Anterior">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <button class="arrow-btn" id="nextBtn" aria-label="Siguiente">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
  /* ── SVG icons per stage (line-art, single stroke) ── */
  const icons = {
    tierra: `
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="64" stroke="currentColor" stroke-width="0.8"/>
        <!-- Mountain silhouette -->
        <polyline points="36,145 72,88 100,110 132,72 164,145" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        <!-- Ground lines -->
        <line x1="36" y1="145" x2="164" y2="145" stroke="currentColor" stroke-width="0.8"/>
        <line x1="50" y1="158" x2="150" y2="158" stroke="currentColor" stroke-width="0.5" opacity="0.5"/>
        <!-- Sun / horizon mark -->
        <circle cx="100" cy="68" r="3" fill="currentColor"/>
        <line x1="100" y1="56" x2="100" y2="50" stroke="currentColor" stroke-width="0.8"/>
        <line x1="112" y1="60" x2="116" y2="56" stroke="currentColor" stroke-width="0.8"/>
        <line x1="88" y1="60" x2="84" y2="56" stroke="currentColor" stroke-width="0.8"/>
      </svg>`,

    semilla: `
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="64" stroke="currentColor" stroke-width="0.8"/>
        <!-- Seed/leaf form -->
        <path d="M100 148 C100 148 52 128 52 88 C52 60 100 48 100 48 C100 48 148 60 148 88 C148 128 100 148 100 148 Z"
              stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
        <!-- Inner vein -->
        <line x1="100" y1="148" x2="100" y2="48" stroke="currentColor" stroke-width="0.7" stroke-dasharray="3 4"/>
        <!-- Side veins -->
        <path d="M100 100 C86 92 70 90 62 86" stroke="currentColor" stroke-width="0.7"/>
        <path d="M100 100 C114 92 130 90 138 86" stroke="currentColor" stroke-width="0.7"/>
        <path d="M100 118 C88 112 76 110 68 106" stroke="currentColor" stroke-width="0.7"/>
        <path d="M100 118 C112 112 124 110 132 106" stroke="currentColor" stroke-width="0.7"/>
        <!-- Root dots -->
        <circle cx="100" cy="148" r="2.5" fill="currentColor"/>
      </svg>`,

    nutrimiento: `
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="64" stroke="currentColor" stroke-width="0.8"/>
        <!-- Concentric arcs suggesting water / nourishment -->
        <path d="M60 110 Q100 72 140 110" stroke="currentColor" stroke-width="1.1"/>
        <path d="M68 122 Q100 84 132 122" stroke="currentColor" stroke-width="0.8" opacity="0.7"/>
        <path d="M76 134 Q100 96 124 134" stroke="currentColor" stroke-width="0.6" opacity="0.45"/>
        <!-- Drop -->
        <path d="M100 56 C100 56 80 80 80 92 A20 20 0 0 0 120 92 C120 80 100 56 100 56 Z"
              stroke="currentColor" stroke-width="1.1"/>
        <!-- Crosshair dot -->
        <circle cx="100" cy="92" r="2.5" fill="currentColor"/>
      </svg>`,

    siembra: `
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="64" stroke="currentColor" stroke-width="0.8"/>
        <!-- House / shelter form -->
        <polyline points="60,120 60,88 100,58 140,88 140,120" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
        <rect x="82" y="96" width="36" height="24" stroke="currentColor" stroke-width="1" rx="0"/>
        <!-- Foundation -->
        <line x1="52" y1="120" x2="148" y2="120" stroke="currentColor" stroke-width="0.8"/>
        <!-- Construction lines -->
        <line x1="100" y1="58" x2="100" y2="44" stroke="currentColor" stroke-width="0.7" stroke-dasharray="2 3"/>
        <!-- Modular grid hint -->
        <line x1="82" y1="108" x2="118" y2="108" stroke="currentColor" stroke-width="0.5" opacity="0.5"/>
        <line x1="100" y1="96" x2="100" y2="120" stroke="currentColor" stroke-width="0.5" opacity="0.5"/>
      </svg>`,

    cosecha: `
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="64" stroke="currentColor" stroke-width="0.8"/>
        <!-- Wheat / harvest stalk -->
        <line x1="100" y1="148" x2="100" y2="60" stroke="currentColor" stroke-width="1"/>
        <!-- Left grains -->
        <path d="M100 80 C88 72 80 62 84 56 C88 62 96 68 100 80" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
        <path d="M100 96 C84 88 74 76 78 68 C84 74 94 82 100 96" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
        <path d="M100 112 C82 106 72 94 76 86 C82 92 92 100 100 112" stroke="currentColor" stroke-width="0.9" stroke-linejoin="round"/>
        <!-- Right grains -->
        <path d="M100 80 C112 72 120 62 116 56 C112 62 104 68 100 80" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
        <path d="M100 96 C116 88 126 76 122 68 C116 74 106 82 100 96" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
        <path d="M100 112 C118 106 128 94 124 86 C118 92 108 100 100 112" stroke="currentColor" stroke-width="0.9" stroke-linejoin="round"/>
        <!-- Ground -->
        <line x1="70" y1="148" x2="130" y2="148" stroke="currentColor" stroke-width="0.8"/>
      </svg>`,
  };

  /* ── Stage data ── */
  const stages = [
    {
      theme:  'th-tierra',
      tag:    'Etapa 01',
      title:  'Tierra',
      body:   'Identificamos y evaluamos de manera estratégica el territorio para asegurar el desarrollo de un proyecto sostenible. Definimos la manera en que el territorio formará parte del ecosistema: adquisición directa, aportación de capital o asociación con propietarios locales.',
      icon:   'tierra',
      dim:    'Estrategia territorial',
      rol:    'Socio fundador · Propietario · Inversionista de tierra',
      res:    'Territorio integrado al ecosistema',
    },
    {
      theme:  'th-semilla',
      tag:    'Etapa 02',
      title:  'Semilla',
      body:   'Detallamos la estructura del desarrollo y articulamos nuestra red inicial de aliados estratégicos. Se concibe la identidad del desarrollo y la narrativa del ecosistema como un solo sistema orgánico.',
      icon:   'semilla',
      dim:    'Estructuración y concepto',
      rol:    'Aliado estratégico · Creador de identidad',
      res:    'Concepto e identidad del ecosistema',
    },
    {
      theme:  'th-nutrimiento',
      tag:    'Etapa 03',
      title:  'Nutrimiento',
      body:   'Estructuramos el capital vital para desarrollar ecosistemas sostenibles. Un actor puede participar desde inversión directa, coinversión, participación patrimonial, co-ownership o vehículos de inversión. Así mismo puedes ser parte del Club Nidoum.',
      icon:   'nutrimiento',
      dim:    'Capital e inversión',
      rol:    'Inversionista directo · Club Nidoum · Co-owner',
      res:    'Capital estructurado y aliado',
    },
    {
      theme:  'th-siembra',
      tag:    'Etapa 04',
      title:  'Siembra',
      body:   'Materializamos los ecosistemas a través de nuestro partner técnico ARCOMPANY, responsables de integrar e implementar arquitectura, ingeniería, construcción modular y diseño interior.',
      icon:   'siembra',
      dim:    'Construcción y ejecución',
      rol:    'Partner técnico · Proveedor · Constructor',
      res:    'Ecosistema físicamente materializado',
    },
    {
      theme:  'th-cosecha',
      tag:    'Etapa 05',
      title:  'Cosecha',
      body:   'Obtenemos el valor agregado generado por el ecosistema en dos dimensiones: Cosecha Comercial, que incluye comercialización y licenciamiento de concepto o marca; y Cosecha Operativa, que activa espacios, servicios y flujos económicos recurrentes.',
      icon:   'cosecha',
      dim:    'Valor y retorno',
      rol:    'Operador · Licenciatario · Inversionista',
      res:    'Flujos económicos y valor de marca',
    },
  ];

  /* ── DOM refs ── */
  const page        = document.getElementById('stagePage');
  const colLeft     = document.getElementById('colLeft');
  const iconWrap    = document.getElementById('iconWrap');
  const colRight    = document.getElementById('colRight');
  const stageTag    = document.getElementById('stageTag');
  const stageTitle  = document.getElementById('stageTitle');
  const stageBody   = document.getElementById('stageBody');
  const metaDim     = document.getElementById('metaDim');
  const metaRol     = document.getElementById('metaRol');
  const metaRes     = document.getElementById('metaRes');
  const stageNumLarge = document.getElementById('stageNumLarge');
  const stageHint   = document.getElementById('stageHint');
  const dotsEl      = document.getElementById('dots');
  const prevBtn     = document.getElementById('prevBtn');
  const nextBtn     = document.getElementById('nextBtn');

  let current  = 0;
  let animating = false;
  const TOTAL  = stages.length;

  /* Dots */
  stages.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', stages[i].title);
    d.addEventListener('click', () => { if (i !== current) goTo(i); });
    dotsEl.appendChild(d);
  });

  function getDots() { return Array.from(dotsEl.querySelectorAll('.dot')); }

  function applyContent(idx) {
    const s = stages[idx];
    stageTag.textContent    = s.tag;
    stageTitle.textContent  = s.title;
    stageBody.textContent   = s.body;
    iconWrap.innerHTML      = icons[s.icon];
    metaDim.textContent     = s.dim;
    metaRol.textContent     = s.rol;
    metaRes.textContent     = s.res;
    stageNumLarge.textContent = `${String(idx+1).padStart(2,'0')} · ${String(TOTAL).padStart(2,'0')}`;
    stageHint.textContent   = idx === TOTAL - 1 ? 'Volver al inicio' : 'Siguiente etapa';
    getDots().forEach((d, i) => d.classList.toggle('active', i === idx));
  }

  function goTo(idx) {
    if (animating) return;
    animating = true;

    const fadeEls = [colLeft, iconWrap, colRight];

    /* fade out */
    fadeEls.forEach(el => el.classList.add('out'));

    setTimeout(() => {
      /* swap theme (page color transition) */
      page.className = 'stage-page ' + stages[idx].theme;
      current = idx;
      applyContent(idx);

      /* fade in */
      fadeEls.forEach(el => el.classList.remove('out'));

      setTimeout(() => { animating = false; }, 380);
    }, 300);
  }

  nextBtn.addEventListener('click', () => goTo((current + 1) % TOTAL));
  prevBtn.addEventListener('click', () => goTo((current - 1 + TOTAL) % TOTAL));

  /* Keyboard */
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') goTo((current + 1) % TOTAL);
    if (e.key === 'ArrowLeft')  goTo((current - 1 + TOTAL) % TOTAL);
  });

  /* Touch swipe */
  let tx0 = 0, tMoved = false;
  document.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; tMoved = false; }, { passive: true });
  document.addEventListener('touchmove',  e => { if (Math.abs(e.touches[0].clientX - tx0) > 8) tMoved = true; }, { passive: true });
  document.addEventListener('touchend',   e => {
    if (!tMoved) return;
    const dx = e.changedTouches[0].clientX - tx0;
    if (Math.abs(dx) > 50) goTo(dx < 0 ? (current + 1) % TOTAL : (current - 1 + TOTAL) % TOTAL);
  });

  /* Init */
  applyContent(0);
</script>
