<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Etapas del Ecosistema · NIDOUM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&family=Roboto+Serif:ital,opsz,wght@0,8..144,100..900;1,8..144,100..900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Stage palettes ── */
    :root {
      --bg:       #F5EDE0;
      --surface:  #EDE0CE;
      --border:   #C9AD8E;
      --text:     #2E2018;
      --muted:    #7B5C3E;
      --accent:   #7B5C3E;
      --card-bg:  #2E2018;
      --card-fg:  #F5EDE0;
      --card-r:   0px;
      --trans:    background 0.7s cubic-bezier(.4,0,.2,1),
                  color      0.7s cubic-bezier(.4,0,.2,1),
                  border-color 0.7s cubic-bezier(.4,0,.2,1);
    }

    /* Tierra — Terracota */
    .theme-tierra {
      --bg:      #F2E8DF;
      --surface: #E8D0C0;
      --border:  #C07050;
      --text:    #2A1508;
      --muted:   #904830;
      --accent:  #C07050;
      --card-bg: #7A3518;
      --card-fg: #F9EDE4;
    }

    /* Semilla — Ochre */
    .theme-semilla {
      --bg:      #F5EDD8;
      --surface: #EAD9A8;
      --border:  #B8922A;
      --text:    #2A1E04;
      --muted:   #7A5C14;
      --accent:  #B8922A;
      --card-bg: #6B4C08;
      --card-fg: #FFF8E8;
    }

    /* Nutrimiento — NightSky */
    .theme-nutrimiento {
      --bg:      #1C2130;
      --surface: #252E42;
      --border:  #4A5878;
      --text:    #E8ECF4;
      --muted:   #8C9AB8;
      --accent:  #8C9AB8;
      --card-bg: #0E1320;
      --card-fg: #D8E0F0;
    }

    /* Siembra — Burgundy */
    .theme-siembra {
      --bg:      #F2E8EC;
      --surface: #E0C4CC;
      --border:  #7A2038;
      --text:    #200810;
      --muted:   #7A2038;
      --accent:  #A03050;
      --card-bg: #4A0C1C;
      --card-fg: #FAE8EC;
    }

    /* Cosecha — Forest */
    .theme-cosecha {
      --bg:      #E8F0E8;
      --surface: #C8DCC8;
      --border:  #3A6040;
      --text:    #0C200E;
      --muted:   #3A6040;
      --accent:  #4A7850;
      --card-bg: #1C3820;
      --card-fg: #E8F4EA;
    }

    /* ── Page ── */
    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Albert Sans', sans-serif;
      transition: var(--trans);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 56px;
      gap: 0;
      background: var(--bg);
      transition: var(--trans);
    }

    /* ── Header ── */
    .header {
      width: 100%;
      max-width: 880px;
      margin-bottom: 56px;
      text-align: center;
    }

    .header-eyebrow {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      transition: color 0.7s;
    }

    .header-title {
      font-family: 'Roboto Serif', serif;
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 400;
      font-style: normal;
      color: var(--text);
      line-height: 1.15;
      transition: color 0.7s;
    }

    /* ── Stage counter ── */
    .stage-counter {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 48px;
      justify-content: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      opacity: 0.35;
      transition: background 0.4s, opacity 0.4s, transform 0.4s;
      cursor: pointer;
    }

    .dot.active {
      opacity: 1;
      transform: scale(1.4);
      background: var(--accent);
    }

    /* ── Card wrapper ── */
    .card-viewport {
      width: 100%;
      max-width: 880px;
      position: relative;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      color: var(--card-fg);
      padding: 64px 72px;
      position: relative;
      overflow: hidden;
      min-height: 460px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: background 0.7s, color 0.7s;
    }

    /* Ornamental number */
    .card-number {
      position: absolute;
      top: -10px;
      right: 48px;
      font-family: 'Roboto Serif', serif;
      font-size: 160px;
      font-weight: 200;
      font-style: italic;
      color: rgba(255,255,255,0.04);
      line-height: 1;
      user-select: none;
      pointer-events: none;
    }

    .card-top {}

    .card-tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
      transition: color 0.7s;
    }

    .card-tag::before {
      content: '';
      display: block;
      width: 24px;
      height: 1px;
      background: var(--accent);
      transition: background 0.7s;
    }

    .card-title {
      font-family: 'Albert Sans', serif;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 500;
      font-style: normal;
      line-height: 1.1;
      margin-bottom: 28px;
      color: var(--card-fg);
      transition: color 0.7s;
    }

    .card-divider {
      width: 40px;
      height: 0.5px;
      background: var(--accent);
      margin-bottom: 28px;
      transition: background 0.7s;
    }

    .card-body {
      font-family: 'Roboto Serif', serif;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.8;
      color: rgba(255,255,255,0.65);
      max-width: 620px;
      transition: color 0.7s;
    }

    /* nutrimiento: dark bg so text needs to be lighter */
    .theme-nutrimiento .card-body { color: rgba(216,224,240,0.7); }

    .card-bottom {
      margin-top: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .card-stage-label {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .card-stage-num {
      font-family: 'Roboto Serif', serif;
      font-size: 11px;
      font-style: italic;
      color: var(--accent);
      transition: color 0.7s;
    }

    /* ── Nav ── */
    .nav-row {
      width: 100%;
      max-width: 880px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 32px;
    }

    .nav-hint {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.7s;
    }

    .nav-arrows {
      display: flex;
      gap: 10px;
    }

    .arrow-btn {
      width: 48px;
      height: 48px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: background 0.3s, border-color 0.3s, color 0.3s,
                  var(--trans);
    }

    .arrow-btn:hover {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .arrow-btn svg { width: 16px; height: 16px; }

    /* ── Slide animation ── */
    .card-viewport {
      perspective: 1000px;
    }

    .card.slide-out-left {
      animation: slideOutLeft 0.4s cubic-bezier(.4,0,.2,1) forwards;
    }

    .card.slide-in-right {
      animation: slideInRight 0.4s cubic-bezier(.4,0,.2,1) forwards;
    }

    .card.slide-out-right {
      animation: slideOutRight 0.4s cubic-bezier(.4,0,.2,1) forwards;
    }

    .card.slide-in-left {
      animation: slideInLeft 0.4s cubic-bezier(.4,0,.2,1) forwards;
    }

    @keyframes slideOutLeft {
      from { transform: translateX(0); opacity: 1; }
      to   { transform: translateX(-40px); opacity: 0; }
    }

    @keyframes slideInRight {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideOutRight {
      from { transform: translateX(0); opacity: 1; }
      to   { transform: translateX(40px); opacity: 0; }
    }

    @keyframes slideInLeft {
      from { transform: translateX(-40px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .page { padding: 60px 20px; }
      .card { padding: 40px 28px; min-height: 520px; }
      .card-number { font-size: 120px; right: 16px; }
      .nav-hint { display: none; }
    }
  </style>
</head>
<body>

<div class="page theme-tierra" id="page">

  <div class="header">
    <p class="header-eyebrow">El proceso</p>
    <h2 class="header-title">Nuestro modelo de desarrollo</h2>
  </div>

  <div class="stage-counter" id="dots"></div>

  <div class="card-viewport">
    <div class="card" id="card">

      <div class="card-number" id="cardNumber"></div>

      <div class="card-top">
        <div class="card-tag" id="cardTag"></div>
        <h3 class="card-title" id="cardTitle">Tierra</h3>
        <div class="card-divider" id="cardDivider"></div>
        <p class="card-body" id="cardBody"></p>
      </div>

      <div class="card-bottom">
        <span class="card-stage-label">Ecosistema NIDOUM</span>
        <span class="card-stage-num" id="cardStageNum"></span>
      </div>

    </div>
  </div>

  <div class="nav-row">
    <span class="nav-hint" id="navHint">Desliza para explorar</span>
    <div class="nav-arrows">
      <button class="arrow-btn" id="prevBtn" aria-label="Anterior">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <button class="arrow-btn" id="nextBtn" aria-label="Siguiente">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
  const stages = [
    {
      theme:  'theme-tierra',
      title:  'Tierra',
      body:   'Identificamos y evaluamos de manera estratégica el territorio para asegurar el desarrollo de un proyecto sostenible. Es ahora cuando definimos la manera en la que el territorio formará parte del ecosistema: adquisición directa, aportación de capital o asociación con propietarios locales.',
    },
    {
      theme:  'theme-semilla',
      title:  'Semilla',
      body:   'Detallamos la estructura del desarrollo; se articula nuestra red inicial de aliados estratégicos que participarán en el proyecto. Es en esta etapa donde se concibe la conceptualización de la identidad del desarrollo y la narrativa del ecosistema como un solo sistema.',
    },
    {
      theme:  'theme-nutrimiento',
      title:  'Nutrimiento',
      body:   'Estructuramos el capital vital para desarrollar ecosistemas sostenibles. Un actor puede participar desde la inversión directa, la coinversión, participación patrimonial, esquemas de co-ownership o vehículos de inversión. Así mismo puedes ser parte del Club Nidoum.',
    },
    {
      theme:  'theme-siembra',
      title:  'Siembra',
      body:   'Materializamos los ecosistemas a través de nuestro partner técnico ARCOMPANY, responsables de integrar e implementar arquitectura, ingeniería, construcción modular y diseño interior. El cuidado y la precisión técnica definen cada detalle.',
    },
    {
      theme:  'theme-cosecha',
      title:  'Cosecha',
      body:   'Obtenemos el valor agregado generado por el ecosistema. Esta etapa se manifiesta en dos dimensiones: la Cosecha Comercial, que incluye comercialización directa, intermediarios y licenciamiento; y la Cosecha Operativa, que activa espacios, servicios y flujos económicos recurrentes.',
    },
  ];

  const page       = document.getElementById('page');
  const card       = document.getElementById('card');
  const cardTitle  = document.getElementById('cardTitle');
  const cardTag    = document.getElementById('cardTag');
  const cardBody   = document.getElementById('cardBody');
  const cardNumber = document.getElementById('cardNumber');
  const cardStageNum = document.getElementById('cardStageNum');
  const navHint    = document.getElementById('navHint');
  const dotsEl     = document.getElementById('dots');
  const prevBtn    = document.getElementById('prevBtn');
  const nextBtn    = document.getElementById('nextBtn');

  let current = 0;
  let animating = false;
  const TOTAL = stages.length;

  // Build dots
  stages.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', stages[i].title);
    d.addEventListener('click', () => { if (i !== current) goTo(i, i > current ? 'next' : 'prev'); });
    dotsEl.appendChild(d);
  });

  function getDots() { return Array.from(dotsEl.querySelectorAll('.dot')); }

  function applyStage(idx) {
    const s = stages[idx];
    // Theme on page (backgrounds, text colors)
    page.className = 'page ' + s.theme;
    // Card content
    cardTitle.textContent  = s.title;
    cardTag.textContent    = s.tag;
    cardBody.textContent   = s.body;
    cardNumber.textContent = s.num;
    cardStageNum.textContent = `${String(idx + 1).padStart(2,'0')} / ${String(TOTAL).padStart(2,'0')}`;
    // Dots
    getDots().forEach((d, i) => d.classList.toggle('active', i === idx));
    // Nav hint
    navHint.textContent = idx === TOTAL - 1 ? 'Inicio del ciclo' : 'Siguiente etapa';
  }

  function goTo(idx, dir) {
    if (animating) return;
    animating = true;

    const outClass = dir === 'next' ? 'slide-out-left' : 'slide-out-right';
    const inClass  = dir === 'next' ? 'slide-in-right' : 'slide-in-left';

    card.classList.add(outClass);

    setTimeout(() => {
      card.classList.remove(outClass);
      current = idx;
      applyStage(current);
      card.classList.add(inClass);
      setTimeout(() => {
        card.classList.remove(inClass);
        animating = false;
      }, 420);
    }, 380);
  }

  nextBtn.addEventListener('click', () => {
    goTo((current + 1) % TOTAL, 'next');
  });

  prevBtn.addEventListener('click', () => {
    goTo((current - 1 + TOTAL) % TOTAL, 'prev');
  });

  // Touch/swipe
  let tx0 = 0, ty0 = 0, tMoved = false;
  card.addEventListener('touchstart', e => {
    tx0 = e.touches[0].clientX;
    ty0 = e.touches[0].clientY;
    tMoved = false;
  }, { passive: true });
  card.addEventListener('touchmove', e => {
    if (Math.abs(e.touches[0].clientX - tx0) > 6) tMoved = true;
  }, { passive: true });
  card.addEventListener('touchend', e => {
    if (!tMoved) return;
    const dx = e.changedTouches[0].clientX - tx0;
    if (Math.abs(dx) > 40) {
      goTo(dx < 0 ? (current + 1) % TOTAL : (current - 1 + TOTAL) % TOTAL, dx < 0 ? 'next' : 'prev');
    }
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') goTo((current + 1) % TOTAL, 'next');
    if (e.key === 'ArrowLeft')  goTo((current - 1 + TOTAL) % TOTAL, 'prev');
  });

  // Init
  applyStage(0);
</script>

</body>
</html>
